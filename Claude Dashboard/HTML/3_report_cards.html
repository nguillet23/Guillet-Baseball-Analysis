<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statcast Report Cards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0e1117;
    --surface: #161b25;
    --border:  #242c3d;
    --accent:  #3b82f6;
    --cyan:    #22d3ee;
    --over:    #f87171;
    --under:   #4ade80;
    --amber:   #fbbf24;
    --muted:   #64748b;
    --text:    #e2e8f0;
    --mono:    'DM Mono', monospace;
    --serif:   'Libre Baskerville', serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 1080px; margin: 0 auto; }

  header { border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; margin-bottom: 1.5rem; }
  header h1 { font-family: var(--serif); font-size: 1.75rem; color: #fff; }
  header p  { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 12px; flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .toolbar input[type=text] {
    padding: 9px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }
  .toolbar input[type=text]:focus { border-color: var(--accent); }
  .toolbar input::placeholder { color: var(--muted); }

  .toolbar select {
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .grade-filter {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .grade-btn {
    padding: 6px 12px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    opacity: 0.5;
  }
  .grade-btn.active { opacity: 1; }

  .count { font-size: 0.75rem; color: var(--muted); margin-left: auto; }

  /* ── Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── Individual card ── */
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    cursor: pointer;
    animation: pop 0.3s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
  .report-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  /* Card header band — color changes by grade */
  .card-band {
    height: 5px;
  }

  .card-top {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .card-identity { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #1e3a5f;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 0.95rem; font-weight: 700;
    color: var(--accent);
    border: 1px solid #2a4a7f;
    flex-shrink: 0;
  }
  .card-name { font-family: var(--serif); font-size: 1rem; color: #fff; }
  .card-season { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* Grade circle */
  .grade-circle {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 1.4rem; font-weight: 700;
    border: 2px solid;
  }

  /* Stat rows */
  .card-stats { padding: 0.9rem 1.25rem; }
  .stat-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-key  { font-size: 0.72rem; color: var(--muted); width: 90px; }
  .stat-bar-wrap { flex: 1; margin: 0 10px; }
  .stat-track { height: 3px; background: var(--border); border-radius: 2px; position: relative; }
  .stat-bar-actual {
    position: absolute; top: 0; left: 0;
    height: 100%; border-radius: 2px;
    background: var(--accent); opacity: 0.6;
  }
  .stat-bar-pred {
    position: absolute; top: 0; left: 0;
    height: 100%; border-radius: 2px;
    background: var(--cyan); opacity: 0.9;
  }
  .stat-values {
    display: flex; gap: 6px; font-size: 0.72rem; white-space: nowrap;
  }
  .stat-actual-v { color: var(--text); font-weight: 500; }
  .stat-pred-v   { color: var(--cyan); }

  /* MB footer */
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.25);
  }
  .mb-actual { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: #fff; }
  .mb-pred   { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--cyan); }
  .mb-error  {
    font-size: 0.75rem; font-weight: 500;
    padding: 4px 10px; border-radius: 4px;
  }
  .mb-label  { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Legend */
  .legend {
    display: flex; gap: 16px; margin-bottom: 1.5rem;
    font-size: 0.72rem; color: var(--muted);
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    color: var(--muted); font-size: 0.85rem;
    grid-column: 1 / -1;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Player Report Cards</h1>

  </header>

  <div class="legend">

    <div class="legend-item"><div class="legend-dot" style="background:var(--over)"></div> Over-predicted</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--under)"></div> Under-predicted</div>
  </div>

  <div class="toolbar">
    <input type="text" id="name-filter" placeholder="Filter by name…" oninput="render()">
    <select id="sort-sel" onchange="render()">
      <option value="name">Sort: name</option>
      <option value="mb-desc">Sort: MB high→low</option>
      <option value="mb-asc">Sort: MB low→high</option>
      <option value="err-desc">Sort: biggest error first</option>

    <div class="grade-filter" id="grade-filter">
      <!-- populated by JS -->
    </div>
    <span class="count" id="count-label"></span>
  </div>

  <div class="cards-grid" id="cards-grid"></div>
</div>

PLAYERS.forEach(p => {
  p.pe = p.MB !== 0 ? +((( p.xMB - p.MB) / Math.abs(p.MB)) * 100).toFixed(1) : 0;
  p.grade = assignGrade(p.pe);
});

/* ============================================================
   GRADING
   ============================================================ */
const GRADE_CONFIG = {
  A: { label:'A', color:'#4ade80', bg:'rgba(74,222,128,0.12)', border:'rgba(74,222,128,0.4)',  maxApe:3  },
  B: { label:'B', color:'#3b82f6', bg:'rgba(59,130,246,0.12)',  border:'rgba(59,130,246,0.4)',  maxApe:7  },
  C: { label:'C', color:'#fbbf24', bg:'rgba(251,191,36,0.12)',  border:'rgba(251,191,36,0.4)',  maxApe:12 },
  D: { label:'D', color:'#f97316', bg:'rgba(249,115,22,0.12)',  border:'rgba(249,115,22,0.4)',  maxApe:20 },
  F: { label:'F', color:'#f87171', bg:'rgba(248,113,113,0.12)', border:'rgba(248,113,113,0.4)', maxApe:Infinity },
};
function assignGrade(pe) {
  const a = Math.abs(pe);
  if (a <= 3)  return 'A';
  if (a <= 7)  return 'B';
  if (a <= 12) return 'C';
  if (a <= 20) return 'D';
  return 'F';
}

/* ============================================================
   GRADE FILTER BUTTONS
   ============================================================ */
let activeGrades = new Set(['A','B','C','D','F']);

function buildGradeButtons() {
  const el = document.getElementById('grade-filter');
  el.innerHTML = Object.entries(GRADE_CONFIG).map(([g, cfg]) => `
    <button class="grade-btn active" id="gbtn-${g}"
      style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border};"
      onclick="toggleGrade('${g}')">${g}</button>
  `).join('');
}

function toggleGrade(g) {
  if (activeGrades.has(g)) {
    if (activeGrades.size === 1) return; // keep at least one
    activeGrades.delete(g);
  } else {
    activeGrades.add(g);
  }
  const btn = document.getElementById('gbtn-' + g);
  btn.classList.toggle('active', activeGrades.has(g));
  render();
}

/* ============================================================
   CARD BUILDER
   ============================================================ */
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function statBarHtml(actual, pred) {
  const cap = Math.max(actual, pred, 1);
  const wa = Math.round((actual / cap) * 100);
  const wp = Math.round((pred   / cap) * 100);
  return `
    <div class="stat-track">
      <div class="stat-bar-actual" style="width:${wa}%"></div>
      <div class="stat-bar-pred"   style="width:${wp}%;height:3px;margin-top:-3px;"></div>
    </div>`;
}

function buildCard(p) {
  const cfg = GRADE_CONFIG[p.grade];
  const errColor = p.pe > 5 ? '#f87171' : p.pe < -5 ? '#4ade80' : '#3b82f6';
  const STAT_ROWS = [
    { label:'Total Bases', actual:p.TB, pred:p.xTB },
    { label:'Hits',        actual:p.H,  pred:p.xH  },
    { label:'Walks',       actual:p.BB, pred:p.xBB },
    { label:'SB',          actual:p.SB, pred:p.xSB },
  ];

  return `
    <div class="report-card">
      <div class="card-band" style="background:${cfg.color}"></div>
      <div class="card-top">
        <div class="card-identity">
          <div class="avatar">${initials(p.Name)}</div>
          <div>
            <div class="card-name">${p.Name}</div>
            <div class="card-season">2025 · model 2019–2024</div>
          </div>
        </div>
        <div class="grade-circle"
          style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">
          ${p.grade}
        </div>
      </div>
      <div class="card-stats">
        ${STAT_ROWS.map(s => `
          <div class="stat-row">
            <span class="stat-key">${s.label}</span>
            <div class="stat-bar-wrap">${statBarHtml(s.actual, s.pred)}</div>
            <div class="stat-values">
              <span class="stat-actual-v">${s.actual}</span>
              <span style="color:var(--muted);">/</span>
              <span class="stat-pred-v">${s.pred}</span>
            </div>
          </div>`).join('')}
      </div>
      <div class="card-footer">
        <div>
          <div class="mb-label">Actual MB</div>
          <div class="mb-actual">${p.MB}</div>
        </div>
        <div style="color:var(--muted);font-size:1.2rem">→</div>
        <div>
          <div class="mb-label">xMB</div>
          <div class="mb-pred">${p.xMB}</div>
        </div>
        <div class="mb-error" style="color:${errColor};background:${errColor}18;border:1px solid ${errColor}33">
          ${p.pe > 0 ? '+' : ''}${p.pe}%
        </div>
      </div>
    </div>`;
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const q    = document.getElementById('name-filter').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  const GRADE_ORDER = { A:0, B:1, C:2, D:3, F:4 };

  let list = PLAYERS.filter(p =>
    p.Name.toLowerCase().includes(q) && activeGrades.has(p.grade)
  );

  if (sort === 'name')     list.sort((a, b) => a.Name.localeCompare(b.Name));
  if (sort === 'mb-desc')  list.sort((a, b) => b.MB - a.MB);
  if (sort === 'mb-asc')   list.sort((a, b) => a.MB - b.MB);
  if (sort === 'err-desc') list.sort((a, b) => Math.abs(b.pe) - Math.abs(a.pe));
  if (sort === 'grade')    list.sort((a, b) => GRADE_ORDER[a.grade] - GRADE_ORDER[b.grade]);

  const grid = document.getElementById('cards-grid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">No players match the current filters.</div>`;
  } else {
    grid.innerHTML = list.map(buildCard).join('');
  }
  document.getElementById('count-label').textContent = `${list.length} of ${PLAYERS.length} players`;
}

buildGradeButtons();
render();
</script>
